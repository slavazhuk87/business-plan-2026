<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статьевед</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e8;
      --border-focus: #a78bfa;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b8a;
      --placeholder: rgba(107, 107, 138, 0.5);
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --accent-glow: rgba(124, 58, 237, 0.18);
      --shadow-sm: 0 1px 4px rgba(60, 40, 120, 0.07);
      --shadow-md: 0 4px 24px rgba(60, 40, 120, 0.10);
      --shadow-focus: 0 0 0 4px rgba(124, 58, 237, 0.13);
      --radius: 14px;
      --radius-sm: 9px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 28px 40px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .logo {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.28);
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 60px;
      gap: 0;
    }

    .editor-wrapper {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Tagline ── */
    .tagline {
      text-align: center;
      margin-bottom: 8px;
    }

    .tagline h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      line-height: 1.18;
    }

    .tagline p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    /* ── Channel row ── */
    .channel-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .input-field {
      flex: 1;
      height: 46px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 16px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-primary);
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.18s ease;
    }

    .input-field::placeholder {
      color: var(--placeholder);
    }

    .input-field:hover {
      border-color: #c4b5fd;
      background: #fdfdff;
    }

    .input-field:focus {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-focus);
      background: var(--surface);
    }

    .input-field.input-wide {
      flex: 2.2;
    }

    /* ── Article textarea ── */
    .textarea-wrapper {
      position: relative;
      width: 100%;
    }

    .article-textarea {
      width: 100%;
      min-height: 260px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-primary);
      outline: none;
      resize: vertical;
      box-shadow: var(--shadow-md);
      transition: border-color 0.22s ease, box-shadow 0.25s ease, background 0.18s ease;
      caret-color: var(--accent);
    }

    .article-textarea::placeholder {
      color: var(--placeholder);
    }

    .article-textarea:hover {
      border-color: #c4b5fd;
      background: #fdfdff;
    }

    .article-textarea:focus {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-focus), var(--shadow-md);
      background: var(--surface);
    }

    /* blinking cursor indicator when focused */
    .cursor-hint {
      position: absolute;
      bottom: 14px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .cursor-hint.visible {
      opacity: 0.6;
      transform: translateY(0);
    }

    .cursor-blink {
      width: 2px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Image upload ── */
    .upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .upload-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .upload-box {
      width: 110px;
      height: 110px;
      background: var(--surface);
      border: 1.8px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, transform 0.18s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .upload-box:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-md);
      transform: scale(1.03);
    }

    .upload-box:active {
      transform: scale(0.98);
    }

    .upload-box input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .plus-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .upload-box:hover .plus-icon {
      background: rgba(124, 58, 237, 0.2);
    }

    .plus-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent);
      stroke-width: 2.4;
      stroke-linecap: round;
      fill: none;
    }

    /* Preview image in upload box */
    .upload-box img.preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: calc(var(--radius) - 2px);
    }

    /* ── Submit button ── */
    .submit-btn {
      align-self: center;
      margin-top: 6px;
      padding: 13px 42px;
      background: linear-gradient(135deg, #7c3aed 0%, #9f67ff 100%);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 18px rgba(124, 58, 237, 0.35);
      transition: box-shadow 0.22s ease, transform 0.18s ease, filter 0.18s ease;
      outline: none;
    }

    .submit-btn:hover {
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.45);
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .submit-btn:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.3);
    }

    /* ── Success toast ── */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e;
      color: #fff;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
      white-space: nowrap;
      box-shadow: 0 6px 28px rgba(0,0,0,0.18);
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 40px 28px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .channel-row {
        flex-direction: column;
      }
      .tagline h1 {
        font-size: 1.5rem;
      }
      main {
        padding: 24px 16px 48px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 6h16M4 10h10M4 14h12M4 18h8"/>
        </svg>
      </div>
      Статьевед
    </div>
  </header>

  <main>
    <div class="editor-wrapper">

      <!-- Tagline -->
      <div class="tagline">
        <h1>Публикуйте научные статьи</h1>
        <p>Делитесь знаниями с научным сообществом</p>
      </div>

      <!-- Channel inputs -->
      <div class="channel-row">
        <input
          class="input-field"
          type="text"
          id="channelName"
          placeholder="Назовите свой канал"
          autocomplete="off"
          spellcheck="false"
        />
        <input
          class="input-field input-wide"
          type="text"
          id="channelLink"
          placeholder="Добавьте ссылку на свой Telegram или YouTube-канал (необязательно)"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <!-- Article textarea -->
      <div class="textarea-wrapper">
        <textarea
          class="article-textarea"
          id="articleText"
          placeholder="Напишите свою статью..."
          spellcheck="true"
        ></textarea>
        <div class="cursor-hint" id="cursorHint">
          <span class="cursor-blink"></span>
          <span>Редактирование</span>
        </div>
      </div>

      <!-- Image upload -->
      <div class="upload-area">
        <span class="upload-label">Добавить изображение (необязательно)</span>
        <div class="upload-box" id="uploadBox">
          <div class="plus-icon">
            <svg viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <input type="file" accept="image/*" id="imageInput" tabindex="-1" />
        </div>
      </div>

      <!-- Submit -->
      <button class="submit-btn" id="submitBtn">Опубликовать статью</button>

    </div>
  </main>

  <footer>© 2026 Статьевед — платформа для научных публикаций</footer>

  <!-- Toast -->
  <div class="toast" id="toast">Статья успешно опубликована!</div>

  <script>
    // Blinking cursor hint on textarea focus
    const textarea = document.getElementById('articleText');
    const cursorHint = document.getElementById('cursorHint');

    textarea.addEventListener('focus', () => {
      cursorHint.classList.add('visible');
    });
    textarea.addEventListener('blur', () => {
      cursorHint.classList.remove('visible');
    });

    // Image upload preview
    const imageInput = document.getElementById('imageInput');
    const uploadBox  = document.getElementById('uploadBox');
    const plusIcon   = uploadBox.querySelector('.plus-icon');

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Remove existing preview if any
        const existing = uploadBox.querySelector('img.preview');
        if (existing) existing.remove();

        const img = document.createElement('img');
        img.src = ev.target.result;
        img.className = 'preview';
        img.alt = 'Превью изображения';
        uploadBox.insertBefore(img, imageInput);
        plusIcon.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // Submit action with toast
    const submitBtn = document.getElementById('submitBtn');
    const toast     = document.getElementById('toast');
    let toastTimer  = null;

    submitBtn.addEventListener('click', () => {
      const channel = document.getElementById('channelName').value.trim();
      const text    = textarea.value.trim();

      if (!text) {
        textarea.focus();
        textarea.style.borderColor = '#f87171';
        textarea.style.boxShadow   = '0 0 0 4px rgba(248,113,113,0.15)';
        setTimeout(() => {
          textarea.style.borderColor = '';
          textarea.style.boxShadow   = '';
        }, 1400);
        return;
      }

      // Show toast
      clearTimeout(toastTimer);
      toast.textContent = channel
        ? `Статья от «${channel}» опубликована!`
        : 'Статья успешно опубликована!';
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);

      // Button animation
      submitBtn.textContent = 'Опубликовано ✓';
      submitBtn.style.background = 'linear-gradient(135deg, #059669 0%, #34d399 100%)';
      setTimeout(() => {
        submitBtn.textContent = 'Опубликовать статью';
        submitBtn.style.background = '';
      }, 2600);
    });
  </script>

</body>
</html>
